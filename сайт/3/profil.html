<section id="calculator" style="background-color: #fff;">

            <div class="form-container">
                <form id="calc-form">
                    <div class="form-group">
                        <label for="num1">Первое число</label>
                        <input type="number" id="num1" placeholder="Введите число" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="operation">Операция</label>
                        <select id="operation" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
                            <option value="+">Сложение (+)</option>
                            <option value="-">Вычитание (-)</option>
                            <option value="*">Умножение (*)</option>
                            <option value="/">Деление (/)</option>
                            <option value="?=">Равно (?=)</option>
                            <option value="%">Ост от деление (%)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="num2">Второе число</label>
                        <input type="number" id="num2" placeholder="Введите число" required>
                    </div>

                    <button type="submit" class="submit-btn">Посчитать на сервере</button>
                </form>
                
                <div id="calc-result" style="margin-top: 20px; font-size: 24px; font-weight: bold; text-align: center; color: #007bff;">
